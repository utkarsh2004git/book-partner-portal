name: PR Build & Test Pipeline

on:
  pull_request:
    branches: [ "main" ] # Change "main" if your base branch is named differently

permissions:
  contents: read
  pull-requests: write # Required for the test reporter to comment on the PR
  checks: write        # Required for the test reporter to show annotations

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 1. Spin up a fresh MySQL container
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pubs
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      # 2. Pull the code from the Pull Request
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. Build the Schema and Insert Data
      - name: Initialize Database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot pubs < database/create.sql
          mysql -h 127.0.0.1 -P 3306 -u root -proot pubs < database/insertdata.sql

      # 4. Setup Java 17 and Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 5. Run the Tests (Overriding application.properties to use the service container)
      - name: Run Maven Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/pubs?useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn clean test

      # 6. Generate the Beautiful Test Report Summary
      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # Crucial: This ensures the report generates even if tests fail!
        with:
          files: "target/surefire-reports/*.xml"

      # 7. Package the JAR (Only if tests passed)
      - name: Build JAR
        if: success()
        run: mvn package -DskipTests

      # 8. Upload the JAR so developers can download it from the PR
      - name: Upload JAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: book-partner-portal-build
          path: target/*.jar
          retention-days: 14