spring.application.name=book-partner-portal
spring.data.rest.base-path=/api
# ===============================
# DATABASE CONNECTION (WIFI HOST)
# ===============================
spring.datasource.url=mysql.url
spring.datasource.username=user.name
spring.datasource.password=user.password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIBERNATE / JPA SETTINGS
# ===============================
# CRITICAL: Set to 'none' because our DB schema already exists and we cannot alter it!
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SPRING DATA REST CONFIG
# ===============================
# By default, Spring Data REST hides database IDs. We need to see them for our UI.
spring.data.rest.return-body-on-create=true
spring.data.rest.return-body-on-update=true
